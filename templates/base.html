<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block titulo %}Catequesis{% endblock %}</title>
    <link rel="stylesheet" href="/static/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light" style="background-color: #fff6cf;">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Catequesis</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/catequistas">Catequistas</a></li>
                <li class="nav-item"><a class="nav-link" href="/estudiantes">Estudiantes</a></li>
                <li class="nav-item"><a class="nav-link" href="/grupos">Grupos</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    {% block contenido %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
